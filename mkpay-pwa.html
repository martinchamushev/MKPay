  <meta name="apple-mobile-web-app-title" content="MKPay" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>MKPay</title>

  <!-- PWA Manifest inline via JS -->
  <script>
    const manifestData = {
      name: "MKPay",
      short_name: "MKPay",
      description: "Macedonian payment app",
      start_url: ".",
      display: "standalone",
      background_color: "#0A0A0A",
      theme_color: "#0A0A0A",
      orientation: "portrait",
      icons: [
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230A0A0A'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='white'%3E🇲🇰%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230A0A0A'/%3E%3Ctext x='256' y='340' font-size='260' text-anchor='middle' fill='white'%3E🇲🇰%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], {type: "application/json"});
    const manifestURL = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = manifestURL;
    document.head.appendChild(link);
  </script>

  <!-- Apple touch icon inline SVG -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230A0A0A'/%3E%3Ctext x='90' y='125' font-size='90' text-anchor='middle'%3E🇲🇰%3C/text%3E%3C/svg%3E" />

function QRCanvas({ value, size = 180, dark }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const fg = dark ? "#F0F0F0" : "#0A0A0A";
    const bg = dark ? "#1A1A1A" : "#FFFFFF";
    ctx.fillStyle = bg; ctx.fillRect(0, 0, size, size);
    let seed = 0;
    for (let i = 0; i < value.length; i++) seed = (seed * 31 + value.charCodeAt(i)) & 0xffffffff;
    const rand = () => { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return (seed >>> 0) / 0xffffffff; };
    const modules = 21, cell = Math.floor(size / (modules + 4)), offset = Math.floor((size - cell * modules) / 2);
    for (let r = 0; r < modules; r++) for (let c = 0; c < modules; c++) {
      const inCorner = (r < 7 && c < 7) || (r < 7 && c >= modules - 7) || (r >= modules - 7 && c < 7);
      if (!inCorner && rand() > 0.55) { ctx.fillStyle = fg; ctx.fillRect(offset + c * cell, offset + r * cell, cell - 1, cell - 1); }
    }
    const drawFinder = (x, y) => {
      ctx.fillStyle = fg; ctx.fillRect(x, y, cell * 7, cell * 7);
      ctx.fillStyle = bg; ctx.fillRect(x + cell, y + cell, cell * 5, cell * 5);
      ctx.fillStyle = fg; ctx.fillRect(x + cell * 2, y + cell * 2, cell * 3, cell * 3);
    };
    drawFinder(offset, offset);
    drawFinder(offset + (modules - 7) * cell, offset);
    drawFinder(offset, offset + (modules - 7) * cell);
  }, [value, size, dark]);
  return <canvas ref={canvasRef} width={size} height={size} style={{ borderRadius: 8 }} />;
}

            {amount && <button onClick={() => setAmount("")} style={{ background: t.surface, border: "none", borderRadius: 12, padding: "12px 16px", fontSize: 13, color: t.subtext, cursor: "pointer", fontWeight: 600 }}>Clear</button>}
          </div>
          <button style={{ width: "100%", marginTop: 16, background: t.surface, border: "none", borderRadius: 14, padding: "14px", fontSize: 14, fontWeight: 700, color: t.subtext, cursor: "pointer" }}>Share QR Code</button>
        </div>
      )}

      {(mode === "scan" || mode === "scanning") && !scanned && (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", padding: "28px 24px" }}>
          <div style={{ position: "relative", width: 240, height: 240, marginBottom: 28 }}>
            <div style={{ position: "absolute", inset: 0, background: t.surface2, borderRadius: 20, overflow: "hidden" }}>

                <QRCanvas value="mkpay://bojan.t?amount=500" size={140} dark={!dark} />
              </div>
            </div>
            {[["0%","0%","0","0"],["0%","auto","0","auto"],["auto","0%","auto","0"],["auto","auto","auto","auto"]].map(([t2,r,b,l], i) => (

          {mode === "scan" && <button onClick={handleScan} style={{ background: "linear-gradient(135deg, #6C63FF, #3B82F6)", color: "#fff", border: "none", borderRadius: 14, padding: "14px 36px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Simulate Scan</button>}

function SendScreen({ dark }) {
  const t = T(dark);
  const [selected, setSelected] = useState(null);
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [sent, setSent] = useState(false);
  const handleKey = (k) => {
    if (k === "⌫") setAmount(a => a.slice(0, -1));
    else if (k === "." && amount.includes(".")) return;
    else if (amount.length < 8) setAmount(a => a + k);
  };
  if (sent) return (
    <div style={{ padding: "80px 24px", textAlign: "center", background: t.bg, minHeight: "100%" }}>
      <div style={{ fontSize: 64, marginBottom: 16 }}>✅</div>
      <h2 style={{ fontWeight: 800, fontSize: 24, color: t.text, margin: "0 0 8px" }}>Sent!</h2>
      <p style={{ color: t.subtext, fontSize: 15, margin: "0 0 4px" }}>{formatMKD(parseFloat(amount))} sent to {selected?.name}</p>
      {note && <p style={{ color: t.muted, fontSize: 13, margin: "0 0 32px" }}>"{note}"</p>}
      <button onClick={() => { setSent(false); setAmount(""); setNote(""); setSelected(null); }} style={{ background: t.text, color: t.bg, border: "none", borderRadius: 14, padding: "14px 40px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Send again</button>
    </div>
  );
  return (
    <div style={{ padding: "24px 24px 0", background: t.bg, minHeight: "100%" }}>
      <h2 style={{ fontWeight: 800, fontSize: 22, color: t.text, margin: "0 0 20px" }}>Send Money</h2>
      <div style={{ display: "flex", gap: 14, overflowX: "auto", paddingBottom: 8, marginBottom: 24 }}>
        {mockContacts.map(c => (
          <div key={c.id} onClick={() => setSelected(c)} style={{ textAlign: "center", cursor: "pointer", flexShrink: 0 }}>
            <div style={{ width: 52, height: 52, borderRadius: "50%", background: c.color, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: 16, border: selected?.id === c.id ? `3px solid ${t.text}` : "3px solid transparent" }}>{c.initials}</div>
            <p style={{ margin: "6px 0 0", fontSize: 11, color: t.subtext, fontWeight: 500 }}>{c.name.split(" ")[0]}</p>
          </div>
        ))}
      </div>
      <div style={{ background: t.surface2, borderRadius: 18, padding: "20px 24px", textAlign: "center", marginBottom: 16 }}>
        <p style={{ margin: "0 0 4px", fontSize: 13, color: t.muted }}>{selected ? `To ${selected.name}` : "Select a contact"}</p>
        <p style={{ margin: 0, fontSize: 38, fontWeight: 800, color: amount ? t.text : t.faint, letterSpacing: -1 }}>{amount ? formatMKD(parseFloat(amount)) : "0 ден"}</p>
      </div>
      <input value={note} onChange={e => setNote(e.target.value)} placeholder="Add a note (optional)"
        style={{ width: "100%", border: `1.5px solid ${t.inputBorder}`, borderRadius: 12, padding: "12px 16px", fontSize: 14, color: t.text, background: t.bg, outline: "none", marginBottom: 20 }} />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 20 }}>
        {["1","2","3","4","5","6","7","8","9",".","0","⌫"].map(k => (
          <button key={k} onClick={() => handleKey(k)} style={{ background: k === "⌫" ? t.surface : t.surface2, border: "none", borderRadius: 14, padding: "18px 0", fontSize: 20, fontWeight: 600, color: t.text, cursor: "pointer" }}>{k}</button>
        ))}
      </div>
      <button onClick={() => { if (selected && amount) setSent(true); }} disabled={!selected || !amount}
        style={{ width: "100%", background: selected && amount ? t.text : t.surface, color: selected && amount ? t.bg : t.faint, border: "none", borderRadius: 14, padding: "16px", fontSize: 16, fontWeight: 700, cursor: selected && amount ? "pointer" : "default" }}>
        Send {amount ? formatMKD(parseFloat(amount)) : ""}
      </button>
    </div>
  );
}

  const [filter, setFilter] = useState("all");
  const [categories, setCategories] = useState({});
  const [loading, setLoading] = useState(false);
  const [categorized, setCategorized] = useState(false);
  const [error, setError] = useState(null);
  const [spendingView, setSpendingView] = useState(false);
  const filtered = filter === "all" ? mockHistory : mockHistory.filter(tx => tx.type === filter);
  const grouped = filtered.reduce((acc, tx) => { (acc[tx.date] = acc[tx.date] || []).push(tx); return acc; }, {});

  const handleCategorize = async () => {
    setLoading(true); setError(null);
    try {
      const list = mockHistory.map(tx => `- id:${tx.id} note:"${tx.note}" amount:${tx.amount} type:${tx.type}`).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: `Categorize each transaction into exactly one of: Food & Dining, Housing, Entertainment, Transport, Groceries, Transfer, Other.\n\nTransactions:\n${list}\n\nRespond ONLY with JSON like: {"1":"Food & Dining","2":"Transport",...}. No markdown, no backticks.` }] })
      });
      const data = await res.json();
      setCategories(JSON.parse(data.content.map(b => b.text || "").join("").trim()));
      setCategorized(true);
    } catch { setError("Could not categorize. Please try again."); }
    setLoading(false);
  };

  const spendingBreakdown = Object.entries(mockHistory.filter(tx => tx.type === "sent" && categories[tx.id]).reduce((acc, tx) => { const c = categories[tx.id]; acc[c] = (acc[c] || 0) + tx.amount; return acc; }, {})).sort((a, b) => b[1] - a[1]);
  const totalSpent = spendingBreakdown.reduce((s, [, v]) => s + v, 0);

  return (
    <div style={{ padding: "24px 24px 0", background: t.bg, minHeight: "100%" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ fontWeight: 800, fontSize: 22, color: t.text, margin: 0 }}>Activity</h2>
        {categorized && <button onClick={() => setSpendingView(v => !v)} style={{ background: spendingView ? t.text : t.surface, color: spendingView ? t.bg : t.subtext, border: "none", borderRadius: 20, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{spendingView ? "List" : "📊 Insights"}</button>}
      </div>
      {!categorized && <button onClick={handleCategorize} disabled={loading} style={{ width: "100%", marginBottom: 20, background: loading ? t.surface : "linear-gradient(135deg, #6C63FF, #3B82F6)", color: loading ? t.muted : "#fff", border: "none", borderRadius: 14, padding: "14px", fontSize: 14, fontWeight: 700, cursor: loading ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        <span style={{ fontSize: 16 }}>✦</span> {loading ? "Categorizing with AI…" : "Auto-categorize with AI"}
      </button>}
      {error && <p style={{ color: "#FF4444", fontSize: 13, textAlign: "center", marginBottom: 16 }}>{error}</p>}
      {spendingView && categorized && (
        <div style={{ marginBottom: 24 }}>
          {spendingBreakdown.map(([cat, amt]) => {
            const s = CATEGORY_STYLES[cat] || CATEGORY_STYLES["Other"];
            const pct = Math.round((amt / totalSpent) * 100);
            return <div key={cat} style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: t.text }}>{s.emoji} {cat}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>{formatMKD(amt)} <span style={{ color: t.faint }}>({pct}%)</span></span>
              </div>
              <div style={{ background: t.surface, borderRadius: 99, height: 6 }}><div style={{ width: `${pct}%`, height: "100%", background: s.color, borderRadius: 99 }} /></div>
            </div>;
          })}
          <div style={{ marginTop: 20, padding: "14px 16px", background: t.surface2, borderRadius: 14, display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: t.subtext }}>Total sent</span>
            <span style={{ fontSize: 14, fontWeight: 800, color: t.text }}>{formatMKD(totalSpent)}</span>
          </div>
        </div>
      )}
      {!spendingView && <>
        <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
          {["all","sent","received"].map(f => <button key={f} onClick={() => setFilter(f)} style={{ background: filter === f ? t.text : t.surface, color: filter === f ? t.bg : t.subtext, border: "none", borderRadius: 20, padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer", textTransform: "capitalize" }}>{f}</button>)}
        </div>
        {Object.entries(grouped).map(([date, txs]) => (
          <div key={date} style={{ marginBottom: 24 }}>
            <p style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: t.faint, textTransform: "uppercase", letterSpacing: 0.8 }}>{date}</p>
            {txs.map(tx => (
              <div key={tx.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: `1px solid ${t.border2}` }}>
                <div style={{ position: "relative" }}>
                  <Avatar initials={tx.initials} color={tx.color} />
                  <div style={{ position: "absolute", bottom: -2, right: -2, width: 16, height: 16, borderRadius: "50%", background: tx.type === "received" ? t.green : "#FF6B6B", border: `2px solid ${t.bg}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: "#fff", fontWeight: 800 }}>{tx.type === "received" ? "↓" : "↑"}</div>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ margin: 0, fontWeight: 600, fontSize: 14, color: t.text }}>{tx.name}</p>
                  <p style={{ margin: "2px 0 4px", fontSize: 12, color: t.muted }}>{tx.note}</p>
                  <CategoryBadge category={categories[tx.id]} loading={loading && !categories[tx.id]} dark={dark} />
                </div>
                <p style={{ margin: 0, fontWeight: 700, fontSize: 14, color: tx.type === "received" ? t.green : t.text, flexShrink: 0 }}>{tx.type === "received" ? "+" : "−"}{formatMKD(tx.amount)}</p>
              </div>
            ))}
          </div>
        ))}
      </>}
    </div>
  );
}

function ProfileScreen({ dark, onToggleDark }) {
  const t = T(dark);
  const items = [
    { label: "Linked Bank",   value: "Stopanska Banka" },
    { label: "Phone",         value: "+389 70 123 456" },
    { label: "MKPay ID",      value: "@martin.c" },
    { label: "Security",      value: "PIN & Biometrics" },
    { label: "Language",      value: "Македонски" },
    { label: "Notifications", value: "On" },
  ];
  return (
    <div style={{ padding: "24px 24px 0", background: t.bg, minHeight: "100%" }}>
      <div style={{ background: "#0A0A0A", borderRadius: 20, padding: "28px 24px", textAlign: "center", marginBottom: 28 }}>
        <div style={{ width: 68, height: 68, borderRadius: "50%", background: "#6C63FF", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 26, margin: "0 auto 14px" }}>MC</div>
        <p style={{ color: "#fff", fontWeight: 800, fontSize: 20, margin: "0 0 4px" }}>Martin Chamushev</p>
        <p style={{ color: "#666", fontSize: 13, margin: "0 0 16px" }}>@martin.c · Скопје</p>
        <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
          {[["Sent","12,400 ден"],["Received","28,650 ден"]].map(([l,v]) => (
            <div key={l}><p style={{ color: "#fff", fontWeight: 700, fontSize: 15, margin: 0 }}>{v}</p><p style={{ color: "#555", fontSize: 12, margin: 0 }}>{l}</p></div>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", padding: "14px 0", borderBottom: `1px solid ${t.border2}`, marginBottom: 2 }}>
        <div style={{ flex: 1 }}><p style={{ margin: 0, fontSize: 14, fontWeight: 600, color: t.text }}>Dark Mode</p></div>
        <div onClick={onToggleDark} style={{ width: 44, height: 26, borderRadius: 99, background: dark ? "#6C63FF" : t.surface, cursor: "pointer", position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
          <div style={{ position: "absolute", top: 3, left: dark ? 21 : 3, width: 20, height: 20, borderRadius: "50%", background: dark ? "#fff" : t.faint, transition: "left 0.2s" }} />
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        {items.map(({ label, value }) => (
          <div key={label} style={{ display: "flex", alignItems: "center", padding: "14px 0", borderBottom: `1px solid ${t.border2}`, cursor: "pointer" }}>
            <div style={{ flex: 1 }}><p style={{ margin: 0, fontSize: 14, fontWeight: 600, color: t.text }}>{label}</p></div>
            <span style={{ fontSize: 13, color: t.muted }}>{value}</span>
            <span style={{ marginLeft: 8, color: t.faint, fontSize: 14 }}>›</span>
          </div>
        ))}
      </div>
      <button style={{ width: "100%", marginTop: 28, marginBottom: 24, background: dark ? "#2A0A0A" : "#FFF0F0", color: "#FF4444", border: "none", borderRadius: 14, padding: "14px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Log out</button>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("home");
  const [dark, setDark] = useState(false);
  const [showQR, setShowQR] = useState(false);
  const t = T(dark);

  const handleNavigate = (action) => {
    if (action === "qr") { setShowQR(true); return; }
    setTab(action);
  };

  const tabs = [
    { id: "home",    label: "Home",     icon: "⊞" },
    { id: "send",    label: "Send",     icon: "↑" },
    { id: "history", label: "Activity", icon: "↕" },
    { id: "profile", label: "Profile",  icon: "◯" },
  ];

  return (
    <div style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", maxWidth: 430, margin: "0 auto", minHeight: "100vh", minHeight: "100dvh", background: t.bg, display: "flex", flexDirection: "column", position: "relative", transition: "background 0.2s" }}>
      {showQR && <QRScreen dark={dark} onClose={() => setShowQR(false)} />}
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 80 }}>
        {tab === "home"    && <HomeScreen    onNavigate={handleNavigate} dark={dark} />}
        {tab === "send"    && <SendScreen    dark={dark} />}
        {tab === "history" && <HistoryScreen dark={dark} />}
        {tab === "profile" && <ProfileScreen dark={dark} onToggleDark={() => setDark(d => !d)} />}
      </div>
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: t.navBg, borderTop: `1px solid ${t.navBorder}`, display: "flex", padding: "10px 0", paddingBottom: "calc(10px + env(safe-area-inset-bottom))", zIndex: 100, transition: "background 0.2s" }}>
        {tabs.map(({ id, label, icon }) => (
          <button key={id} onClick={() => setTab(id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "4px 0" }}>
            <span style={{ fontSize: 20, color: tab === id ? t.text : t.faint }}>{icon}</span>
            <span style={{ fontSize: 10, fontWeight: 700, color: tab === id ? t.text : t.faint, letterSpacing: 0.3 }}>{label}</span>
            {tab === id && <div style={{ width: 4, height: 4, borderRadius: "50%", background: t.text, marginTop: 2 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// Register service worker for offline support
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'mkpay-v1';
    const ASSETS = ['/'];
    self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))); self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))); self.clients.claim(); });
    self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))); });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}
</script>
